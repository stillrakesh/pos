name: Build macOS Installer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download macOS Node Binary
        run: |
          # Download the macOS Node executable so the backend can run on Mac
          curl -LO https://nodejs.org/dist/v20.12.2/node-v20.12.2-darwin-x64.tar.gz
          tar -xzf node-v20.12.2-darwin-x64.tar.gz
          cp node-v20.12.2-darwin-x64/bin/node ./bundled-node-mac
          chmod +x ./bundled-node-mac

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend React App
        run: npm run build

      - name: Build Captain App
        run: |
          cd frontend/captain
          npm install
          npm run build

      - name: Build Mac DMG
        run: npx electron-builder --mac --x64 -c.mac.identity=null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Mac-Installer
          path: release/*.dmg
